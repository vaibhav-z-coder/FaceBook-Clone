<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./node_modules/bootstrap/dist/css/bootstrap.css">
    <link rel="stylesheet" href="./node_modules/bootstrap-icons/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style2.css">
</head>
<body>

<div class="image">
    <img src="./images/image copy.png" alt="" width="267" height="80">
</div>

<div>
<form id="signupForm">

<h4><b>Create a new account</b></h4>
<p class="up">It's quick and easy.</p>
<hr style="color: gray;">

<div class="split">
    <div>
        <input type="text" id="firstName" placeholder="First name" class="form-control w-100">
    </div>
    <div>
        <input type="text" id="lastName" placeholder="Surname" class="form-control w-100">
    </div>
</div>

<div class="text1">
    <p>Date of birth <span class="bi bi-patch-question-fill"></span></p>
</div>

<div class="slected">
<select id="day" class="sele1">
<option value="">Day</option>
<option>1</option><option>2</option><option>3</option><option>4</option>
<option>5</option><option>6</option><option>7</option><option>8</option>
<option>9</option><option>10</option><option>11</option><option>12</option>
<option>13</option><option>14</option><option>15</option><option>16</option>
<option>17</option><option>18</option><option>19</option><option>20</option>
<option>21</option><option>22</option><option>23</option><option>24</option>
<option>25</option><option>26</option><option>27</option><option>28</option>
<option>29</option><option>30</option><option>31</option>
</select>

<select id="month" class="sele2">
<option value="">Month</option>
<option>Jan</option><option>Feb</option><option>Mar</option>
<option>Apr</option><option>May</option><option>Jun</option>
<option>Jul</option><option>Aug</option><option>Sep</option>
<option>Oct</option><option>Nov</option><option>Dec</option>
</select>

<select id="year" class="sele3">
<option value="">Year</option>
<option>2026</option><option>2025</option><option>2024</option>
<option>2023</option><option>2022</option><option>2021</option>
<option>2020</option>
</select>
</div>

<div class="text1">
<p>Gender <span class="bi bi-patch-question-fill"></span></p>
</div>

<label class="labe1">Female 
<input type="radio" name="gender" value="female">
</label>

<label class="labe2">Male 
<input type="radio" name="gender" value="male">
</label>

<label class="labe3">Custom 
<input type="radio" name="gender" value="custom">
</label>

<div class="wid">
<input type="text" id="signupEmail" placeholder="Mobile number or email address" class="form-control">
</div>

<div class="wid">
<input type="password" id="signupPassword" placeholder="New Password" class="form-control">
</div>

<p class="learn">
People who use our service may have uploaded your contact information to Facebook.
<a href="https://www.facebook.com/help/637205020878504" target="_blank">Learn more.</a>
</p>

<p class="learn learn1">
By clicking Sign up, you agree to our 
<a href="https://www.facebook.com/legal/terms/update" target="_blank">Terms</a>,
<a href="https://www.facebook.com/privacy/policy/?entry_point=data_policy_redirect&entry=0" target="_blank">Privacy Policy</a> and
<a href="https://www.facebook.com/privacy/policies/cookies/?entry_point=cookie_policy_redirect&entry=0" target="_blank">Cookies Policy</a>.
</p>

<button type="submit" class="btn btn-secondary form-control w-50">
<b>Sign up</b>
</button>

<p class="account">Already have an account?</p>

</form>
</div>

<script src="signup.js"></script>

</body>
</html>
